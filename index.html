<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurva - Premium Larvae</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      scroll-behavior: smooth;
      color: white;
      background: black;
    }

    section {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      padding: 20px;
    }

    /* BACKGROUND MAGGOT */
    .bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('./maggot.jpg') center/cover no-repeat;
      filter: brightness(0.25);
      z-index: -1;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 15px;
      right: 20px;
      z-index: 1000;
    }

    .nav a {
      margin-left: 15px;
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .nav a:hover {
      color: gold;
    }

    /* LOGO FULL */
    .logo-full {
      width: 70%;
      max-width: 700px;
      filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.5));
    }

    /* SECTION STYLE */
    .dark {
      background: #111;
      flex-direction: column;
    }

    h2 {
      color: gold;
      margin-bottom: 15px;
    }

    p {
      max-width: 600px;
      margin-bottom: 10px;
    }

    .btn {
      padding: 12px 20px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 15px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="#home">Home</a>
  <a href="#produk">Produk</a>
  <a href="#harga">Harga</a>
  <a href="#kontak">Order</a>
</div>

<!-- HERO FULL LOGO -->
<section id="home">
  <div class="bg"></div>
  <img src="aurva_logo_white.jpg" class="logo-full">
</section>

<!-- PRODUK -->
<section id="produk" class="dark">
  <h2>Kenapa Aurva?</h2>
  <p>Tinggi protein, lebih hemat pakan, dan kualitas stabil untuk peternak serius.</p>
</section>

<!-- HARGA -->
<section id="harga" class="dark">
  <h2>Harga</h2>
  <p>Maggot kering: Rp XX.XXX / kg</p>
  <p>*Harga grosir tersedia</p>
</section>

<!-- KONTAK -->
<section id="kontak" class="dark">
  <h2>Order Sekarang</h2>
  <p>Klik tombol di bawah untuk langsung chat WhatsApp</p>
  <a class="btn" href="https://wa.me/628XXXXXXXXXX" target="_blank">
    Chat WhatsApp
  </a>
</section>

</body>
</html>
